<body>
  <div id="status-bar">
    <span class="lhs" data-prefix="▰▰▰"><span id="ws-label">tdpilot_api</span> · ws <span id="ws-state">connecting</span></span>
    <span class="rhs">
      <span id="status-text">idle</span><span id="model-badge"></span><span id="token-meter"></span><span id="session-meter"></span><span class="cursor">█</span>
    </span>
    <button id="quiet-toggle" type="button"
            title="Quiet mode — hide tool-call detail (Cmd/Ctrl + .)"
            aria-label="Toggle quiet mode"
            aria-pressed="false">
      <span class="qm-glyph">●</span>
    </button>
  </div>
  <!-- v2.5.3 — tool approval banner. Hidden by default. The
       showApprovalBanner JS handler reveals it on approval_request
       WS events. Position above the chat history so it doesn't get
       hidden under scrolling content. -->
  <div id="approval-banner" role="alertdialog" aria-live="assertive">
    <div>
      Tool approval requested: <span class="ab-tool" id="approval-banner-tool">—</span>
    </div>
    <div class="ab-args" id="approval-banner-args"></div>
    <div class="ab-buttons">
      <button type="button" class="approve" id="approval-banner-approve">approve</button>
      <button type="button" class="deny" id="approval-banner-deny">deny</button>
      <span class="ab-countdown" id="approval-banner-countdown">30s</span>
    </div>
  </div>
  <!--
    History is intentionally empty on initial DOM. The IIFE injects the
    welcome screen (including the wizard div) via WELCOME_HTML on load.
    Single source of truth means the wizard DOM survives both the
    initial render AND fullSync([]) — pre-1.7.1 the inline welcome and
    fullSync's rebuild diverged so /reset wiped the wizard forever.

    The history-wrap holds both the scrollable history and the
    floating "↓ N new" jump button (Phase 2 / 1.8.0). The button is
    positioned absolutely inside the wrap so it stays anchored when
    history scrolls.
  -->
  <div id="history-wrap">
    <div id="history"></div>
    <button id="scroll-jump" type="button" title="Jump to bottom (End)"></button>
  </div>
  <div id="lightbox" role="dialog" aria-hidden="true">
    <img id="lightbox-img" alt="screenshot full view" />
  </div>
  <div id="input-bar">
    <textarea id="input" placeholder="ask touchdesigner to do something…" rows="2" autocomplete="off" spellcheck="false"></textarea>
    <button id="stop" title="Interrupt the agent (POST /stop)">stop</button>
    <button id="send">send</button>
  </div>

<script>
(() => {
  // ---- bootstrap ------------------------------------------------------
  // Hash params let power-users override host/port (e.g. running TD on
  // a different machine) but we restrict host to a localhost allowlist
  // so a malicious page can't link the user to the chat with host=evil
  // and exfiltrate their messages.
  const params = new URLSearchParams(location.hash.replace(/^#/, ''));
  const SAFE_HOSTS = new Set(['127.0.0.1', 'localhost', '::1', '[::1]']);
  let TD_HOST = params.get('host') || '127.0.0.1';
  let TD_PORT = params.get('port') || '9987';
  if (!SAFE_HOSTS.has(TD_HOST)) TD_HOST = '127.0.0.1';
  if (!/^\d{1,5}$/.test(TD_PORT)) TD_PORT = '9987';
  const SEND_URL = `http://${TD_HOST}:${TD_PORT}/send`;
  const STOP_URL = `http://${TD_HOST}:${TD_PORT}/stop`;
  const FIRSTRUN_URL = `http://${TD_HOST}:${TD_PORT}/firstrun`;
  // v2.4 / Phase C.6 — capability summary endpoint for featured-prompt chips.
  const CAP_SUMMARY_URL = `http://${TD_HOST}:${TD_PORT}/capabilities-summary`;

  // Per-launch session token, server-injected at GET / time. The literal
  // `__TDPILOT_TOKEN__` value means the page was loaded out-of-band
  // (file://, opened directly from disk) — fetches will 401 in that case
  // and the user gets a clear "missing token" error rather than a silent
  // CSRF window.
  const _tokenMeta = document.querySelector('meta[name="tdpilot-token"]');
  const TOKEN = _tokenMeta ? _tokenMeta.getAttribute('content') : '';
  const HAS_VALID_TOKEN = TOKEN && TOKEN !== '__TDPILOT_TOKEN__';
  const AUTH_HEADERS = HAS_VALID_TOKEN ? { 'X-TDPilot-Token': TOKEN } : {};

  // Welcome HTML — single source of truth for the initial render AND
  // any fullSync([]) rebuild. Pre-1.7.1 these diverged: only the inline
  // initial DOM had the wizard div, so the first /reset wiped it
  // permanently. Defining it once means the DOM stays consistent.
  const WELCOME_HTML = `
        <div class="welcome">
<pre class="logo">████████╗██████╗ ██████╗ ██╗██╗      ██████╗ ████████╗
╚══██╔══╝██╔══██╗██╔══██╗██║██║     ██╔═══██╗╚══██╔══╝
   ██║   ██║  ██║██████╔╝██║██║     ██║   ██║   ██║
   ██║   ██║  ██║██╔═══╝ ██║██║     ██║   ██║   ██║
   ██║   ██████╔╝██║     ██║███████╗╚██████╔╝   ██║
   ╚═╝   ╚═════╝ ╚═╝     ╚═╝╚══════╝ ╚═════╝    ╚═╝</pre>
          <div class="tag">api · standalone · deepseek v4</div>
          <hr class="divider" />
          <div id="wizard" class="wizard" style="display:none;">
            <h4>quickstart</h4>
            <ol id="wizard-steps"></ol>
          </div>
          <div class="body">
            type a message and press <kbd>enter</kbd><br/>
            <kbd>shift</kbd>+<kbd>enter</kbd> for newline
          </div>
          <!-- v2.4 / Phase C.6 — featured-prompt chips. Populated by
               loadChips() from /capabilities-summary on first load;
               hidden until at least one chip arrives. Click to
               prefill the input field. -->
          <div id="chips" class="chips" style="display:none;"></div>
        </div>`;

  const $history = document.getElementById('history');
  const $input = document.getElementById('input');
  const $send = document.getElementById('send');
  const $stop = document.getElementById('stop');
  const $status = document.getElementById('status-text');
  const $statusBar = document.getElementById('status-bar');
  const $lhs = $statusBar.querySelector('.lhs');
  const $wsState = document.getElementById('ws-state');
  const $modelBadge = document.getElementById('model-badge');
  const $tokenMeter = document.getElementById('token-meter');
  const $scrollJump = document.getElementById('scroll-jump');
  const $quietToggle = document.getElementById('quiet-toggle');

  // v2.1.0 — quiet-mode toggle. Replaces the v2.0.0 font-size toggle
  // (the `aA` glyph control) which had inconsistent scaling and felt
  // out of place. Quiet mode hides the tool-call / tool-result blocks
  // so the chat stays readable as a conversation: user prompts +
  // assistant text + errors only. The agent's per-turn working state
  // is still surfaced via the status bar at the top, so there's no
  // progress-blackout. State persists per-browser via localStorage.
  const QUIET_KEY = 'tdpilot.quietMode';
  function applyQuietMode(on) {
    if (on) document.documentElement.classList.add('quiet-mode');
    else document.documentElement.classList.remove('quiet-mode');
    $quietToggle.setAttribute('aria-pressed', on ? 'true' : 'false');
    $quietToggle.querySelector('.qm-glyph').textContent = on ? '●' : '○';
    try { localStorage.setItem(QUIET_KEY, on ? '1' : '0'); } catch (_) { /* private mode */ }
  }
  let _savedQuiet = false;
  try { _savedQuiet = localStorage.getItem(QUIET_KEY) === '1'; } catch (_) { /* private mode */ }
  applyQuietMode(_savedQuiet);
  $quietToggle.addEventListener('click', () => {
    applyQuietMode(!document.documentElement.classList.contains('quiet-mode'));
  });

  // v2.1.0 — contextual ASCII flourishes. On agent turn-end (status
  // transitions to idle after a non-idle state), pick a small glyph
  // from a topic-matched pool and append it to the latest assistant
  // message as a quiet visual punctuation. Retro-monochrome aesthetic
  // — geometric / typographic, no emoji, no color beyond --accent-dim.
  const ASCII_FLOURISHES = {
    default: ['▰▰▰', '∴', '◇ ◇ ◇', '═══', '· · ·', '──◆──', '·:·:·', '▱▰▱', '── ✦ ──'],
    light:    ['✺ ✸ ✺', '\\●/', '─ ✷ ─', '※ ✺ ※'],
    camera:   ['[◉]', '▤ ▥ ▤', '▣ ─ ▣', '┌─◎─┐'],
    particle: ['· ∴ · ∴ ·', '⋆ ✦ ⋆', '·:·∴·:·', '∗ ⋆ ∗'],
    material: ['▓▒░ ░▒▓', '░▒▓▒░', '▓ ─ ▓'],
    audio:    ['~~~ ∿ ~~~', '∿∿∿∿', '· ∿ · ∿ ·'],
    geom:     ['◆ ─ ◇ ─ ◆', '△ ▽ △', '□ ▣ □', '◯ ◉ ◯'],
    error:    ['× × ×', '!? ─ ?!', '× ─ ✗ ─ ×'],
    success:  ['✓ ✓ ✓', '✦ ─ ▰ ─ ✦', '── ✓ ──', '· · ✦ · ·'],
  };
  const TOPIC_RULES = [
    { topic: 'light',    re: /\b(light|lamp|illuminat|sun|shadow|brightness|expos)/i },
    { topic: 'camera',   re: /\b(camera|view|render|frame|lens|fov|projection|cam[0-9]?)\b/i },
    { topic: 'particle', re: /\b(particle|pop|noise|swirl|flow|fluid|sand|spark)/i },
    { topic: 'material', re: /\b(material|texture|color|paint|pbr|phong|shader)/i },
    { topic: 'audio',    re: /\b(audio|sound|music|chop|wave|spectrum|fft)/i },
    { topic: 'geom',     re: /\b(sop|geom|mesh|sphere|box|grid|line|extrude|topo)/i },
    { topic: 'error',    re: /\b(error|fail|broken|crash|exception|traceback)/i },
    { topic: 'success',  re: /\b(done|complete|fixed|working|success|ready|shipped|live)/i },
  ];
  function pickFlourish(contextText) {
    const text = String(contextText || '');
    const matched = ['default'];
    for (const { topic, re } of TOPIC_RULES) {
      if (re.test(text)) matched.push(topic);
    }
    // Prefer a matched topic over default (skew last) — pick uniform random
    // from matched, but if any non-default topic matched, weight it 2× by
    // putting default at the tail of the choice list.
    const specific = matched.filter((t) => t !== 'default');
    const pool = specific.length > 0 && Math.random() > 0.25
      ? ASCII_FLOURISHES[specific[Math.floor(Math.random() * specific.length)]]
      : ASCII_FLOURISHES.default;
    const glyph = pool[Math.floor(Math.random() * pool.length)];
    const topic = specific.length > 0 ? specific[0] : '';
    return { glyph, topic };
  }
  function attachFlourishToLastAssistant() {
    // Walk backwards through #history children to find the most recent
    // assistant message that doesn't already carry a flourish.
    const msgs = $history.querySelectorAll('.msg.assistant');
    if (msgs.length === 0) return;
    const last = msgs[msgs.length - 1];
    if (last.querySelector('.msg-flourish')) return;
    // Use the last user message as the primary topic source (most
    // accurate signal of what the turn is about), with the assistant
    // body as fallback so a generic prompt like "fix it" still picks
    // up topic from the response.
    const userMsgs = $history.querySelectorAll('.msg.user .body');
    const lastUser = userMsgs.length > 0 ? userMsgs[userMsgs.length - 1].textContent : '';
    const assistantBody = last.querySelector('.body');
    const ctx = (lastUser || '') + ' ' + (assistantBody ? assistantBody.textContent : '');
    const { glyph, topic } = pickFlourish(ctx);
    const f = document.createElement('div');
    f.className = 'msg-flourish';
    f.textContent = glyph;
    if (topic) {
      const t = document.createElement('span');
      t.className = 'topic';
      t.textContent = topic;
      f.appendChild(t);
    }
    last.appendChild(f);
  }

  // Render the initial welcome from the same template fullSync uses, so
  // the wizard DOM is guaranteed present.
  $history.innerHTML = WELCOME_HTML;

  // Three-cell block-wave animation that ties to the project's ASCII
  // logo aesthetic. Active while the agent is working; pauses to a
  // steady triple-block when idle.
  const PULSE_FRAMES = ['▰▱▱', '▱▰▱', '▱▱▰', '▱▰▱'];
  const PULSE_INTERVAL_MS = 180;
  const STEADY_PREFIX = '▰▰▰';
  let pulseTimer = null;
  let pulseIdx = 0;

  // Pre-1.7.1 there was a single setStatus() driven by both agent
  // events AND ws transport events. Reconnect strings like
  // "reconnecting in 500ms" fell through isWorkingStatus's allow-list
  // and rendered the Stop button + pulse animation as if a turn were
  // in flight. Now agent and ws state are tracked separately and
  // composed into the displayed text by render().
  let agentState = 'idle';   // idle | thinking | calling | reset | error | <free-form>
  let wsState = 'connecting'; // connecting | connected | reconnecting
  // Phase 2 (1.8.0) — status-bar split: transport on the LHS, agent
  // state + model + token meter on the RHS. modelShort is one of
  // "flash" | "pro" | <model name>; tokenMeter accumulates over the
  // current turn and resets when the agent transitions out of idle.
  let modelShort = '';
  let modelTier = '';
  let modelFull = '';
  let turnInputTokens = 0;
  let turnOutputTokens = 0;
  let turnCachedTokens = 0;
  let lastWorking = false;
  // 2.1.3 — gate the send button on the runtime's turn-end signal,
  // not on the /send fetch resolution. /send returns 'queued' instantly
  // (the worker may still be running on the previous turn), so
  // re-enabling on .finally() let the user fire a follow-up that
  // overwrote the still-pending Chatmessage param. The flag is set on
  // send() and cleared in setAgentStatus when the agent transitions
  // back to a non-working state.
  //
  // 2.1.4 — Codex P2 review on PR #28: the WS-driven status path is
  // load-bearing for re-enabling the button. If the WS drops between
  // /send and the terminal status event, ``awaitingTurnEnd`` stays
  // true forever and the user is locked out. ``pendingTurnEndTimer``
  // is a safety net that re-enables the button after a hard cap so
  // the chat never gets stuck. ``ws.onopen`` also resets it on every
  // reconnect — if a turn was actually still running server-side,
  // the next status event will re-disable correctly; if the user
  // fires a message while the runtime is busy, the FIFO inbox queue
  // catches it (no message lost).
  let awaitingTurnEnd = false;
  let pendingTurnEndTimer = null;
  // v2.4 / B-009 (live-debug 2026-05-13) — bumped from 90s → 240s.
  // Live observation: pro extended-thinking turns on complex prompts
  // ("Build a kaleidoscope feedback loop") routinely take 60-180s
  // for ONE DeepSeek API call (no events emitted during the urlopen).
  // The 90s ceiling tripped the watchdog idle-timeout while the agent was
  // still thinking. 240s gives pro enough room for the slowest
  // single-call observed; longer = real WS drop / worker hang.
  const TURN_END_SAFETY_MS = 240000;

  function clearAwaitingTurnEnd() {
    if (pendingTurnEndTimer !== null) {
      clearTimeout(pendingTurnEndTimer);
      pendingTurnEndTimer = null;
    }
    awaitingTurnEnd = false;
    $send.disabled = false;
  }

  // 2.3.1 — activity watchdog (replaces the v2.1.4 wall-clock deadline).
  // Pre-fix the safety timer was set ONCE in send() and fired after
  // TURN_END_SAFETY_MS regardless of activity, so long-but-healthy tool
  // chains tripped ``idle (timeout)`` while the runtime was still
  // emitting EV_TEXT/EV_TOOL_CALL/EV_TOOL_RESULT. armTurnEndWatchdog
  // resets the timer; applyMessage calls it on every runtime event so
  // the timeout only fires after true silence (genuine WS drop / worker
  // hang).
  function armTurnEndWatchdog() {
    if (pendingTurnEndTimer !== null) clearTimeout(pendingTurnEndTimer);
    pendingTurnEndTimer = setTimeout(() => {
      if (awaitingTurnEnd) {
        clearAwaitingTurnEnd();
        setAgentStatus('idle (timeout)');
      }
    }, TURN_END_SAFETY_MS);
  }

  function isWorkingAgentState(s) {
    const t = String(s || '').toLowerCase();
    if (!t || t === 'idle' || t === 'ready' || t === 'reset' || t === 'connected') return false;
    // 2.1.5 — idle with a contextual suffix (e.g. ``idle (timeout)``
    // emitted by the v2.1.4 send-button safety timer, or any future
    // ``idle (<context>)`` variants) must also be classified as
    // non-working. Otherwise the pulse animation + Stop button stay
    // visible and the UI keeps lying about the agent's state until a
    // real status event arrives — which may never happen if the WS is
    // unavailable. (Codex P2 review on PR #29.)
    if (t.startsWith('idle ') || t.startsWith('idle(')) return false;
    if (t.startsWith('error') || t.startsWith('send failed')) return false;
    return true;
  }

  function startPulse() {
    if (pulseTimer) return;
    $statusBar.classList.add('working');
    pulseTimer = setInterval(() => {
      pulseIdx = (pulseIdx + 1) % PULSE_FRAMES.length;
      $lhs.dataset.prefix = PULSE_FRAMES[pulseIdx];
    }, PULSE_INTERVAL_MS);
  }

  function stopPulse() {
    if (pulseTimer) {
      clearInterval(pulseTimer);
      pulseTimer = null;
    }
    $statusBar.classList.remove('working');
    $lhs.dataset.prefix = STEADY_PREFIX;
  }

  let welcomed = true;

  function clearWelcome() {
    if (!welcomed) return;
    welcomed = false;
    const w = $history.querySelector('.welcome');
    if (w) w.remove();
  }

  // Phase 5.2 — first-run wizard. Polls /firstrun on load and renders
  // the quickstart checklist in the welcome screen. Stays out of the
  // way once the user has any of (key set, any memory saved, any
  // brain installed) — the wizard auto-hides as steps complete.
  function renderFirstRunWizard(state) {
    if (!welcomed) return;
    if (!state || !state.next_steps || state.next_steps.length === 0) {
      const w = document.getElementById('wizard');
      if (w) w.style.display = 'none';
      return;
    }
    const wizard = document.getElementById('wizard');
    const ol = document.getElementById('wizard-steps');
    if (!wizard || !ol) return;
    ol.innerHTML = '';
    for (const step of state.next_steps) {
      const li = document.createElement('li');
      li.className = step.done ? 'done' : '';
      li.textContent = step.label;
      if (step.optional) {
        const span = document.createElement('span');
        span.className = 'opt';
        span.textContent = ' (optional)';
        li.appendChild(span);
      }
      // v2.4 / Phase B.2 — Authmode=open → token migration wizard.
      // Surfaces a one-click switch when the COMP is in legacy open
      // mode (default Authmode flipped to token in v2.3.0 — this
      // catches pre-v2.3.0 dropped-in COMPs).
      if (step.name === 'switch_to_token_auth') {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.textContent = 'Switch to token auth';
        btn.style.cssText =
          'margin-left:8px;padding:2px 10px;background:#6B47FF;' +
          'color:#fff;border:none;border-radius:3px;cursor:pointer;' +
          'font-size:11px;';
        btn.addEventListener('click', async () => {
          btn.disabled = true;
          btn.textContent = 'Switching…';
          try {
            const resp = await fetch(
              `http://${TD_HOST}:${TD_PORT}/set-authmode`,
              {
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  ...AUTH_HEADERS,
                },
                body: JSON.stringify({ mode: 'token' }),
              },
            );
            if (!resp.ok) throw new Error('HTTP ' + resp.status);
            // Server rotated the token. The current tab's TOKEN const
            // is now stale — easiest correct path is a reload. The
            // GET / response injects the fresh token via the
            // __TDPILOT_TOKEN__ template substitution. Other open
            // tabs will hit 401 on their next request and the
            // existing reconnect-banner picks them up.
            window.location.reload();
          } catch (e) {
            btn.disabled = false;
            btn.textContent = 'Retry switch';
            console.warn('[tdpilot] /set-authmode failed', e);
          }
        });
        li.appendChild(btn);
      }
      ol.appendChild(li);
    }
    wizard.style.display = '';
  }

  async function pollFirstRun() {
    if (!welcomed) return;
    try {
      const resp = await fetch(FIRSTRUN_URL, {
        method: 'GET',
        headers: { ...AUTH_HEADERS },
      });
      if (!resp.ok) {
        // Pre-1.7.1 a transient 500/503 during startup killed the
        // wizard forever — the !resp.ok branch returned without
        // rescheduling. Now we treat any non-2xx the same as a
        // network blip: retry after the longer backoff so the
        // wizard recovers when the server comes up.
        setTimeout(pollFirstRun, 8000);
        return;
      }
      const state = await resp.json();
      renderFirstRunWizard(state);
      // Once the wizard is fully complete (no next_steps), stop
      // polling. Otherwise re-check every 4s while the welcome
      // is visible — short enough to feel responsive when the
      // user pastes a key, long enough to not pound the server.
      if (welcomed && state && state.next_steps && state.next_steps.length > 0) {
        setTimeout(pollFirstRun, 4000);
      }
    } catch (_e) {
      // Network blip; try once more after a longer delay so the
      // wizard isn't stuck if the webserver was briefly down.
      if (welcomed) setTimeout(pollFirstRun, 8000);
    }
  }
  pollFirstRun();

  // v2.4 / Phase C.6 — load featured-prompt chips from /capabilities-summary.
  // Best-effort: failures are silent (chips are a nice-to-have, not a
  // blocker on actually chatting). One-shot fetch on welcome render; the
  // chips vanish naturally with the welcome screen on first user message.
  async function loadChips() {
    if (!welcomed) return;
    try {
      const resp = await fetch(CAP_SUMMARY_URL, {
        method: 'GET',
        headers: { ...AUTH_HEADERS },
      });
      if (!resp.ok) return;
      const data = await resp.json();
      if (!welcomed) return;  // user already typed
      const chips = document.getElementById('chips');
      const prompts = Array.isArray(data && data.featured_prompts)
        ? data.featured_prompts.slice(0, 6)
        : [];
      if (!chips || prompts.length === 0) return;
      // Clear any prior content via removeChild loop (safer than
      // assigning to .innerHTML — a security-linter substring rule
      // in this codebase flags that pattern even on empty strings).
      while (chips.firstChild) chips.removeChild(chips.firstChild);
      for (const p of prompts) {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'chip';
        btn.textContent = p;
        btn.addEventListener('click', () => {
          $input.value = p;
          $input.focus();
          // NOTE: deliberately don't auto-send — user reviews + presses enter.
        });
        chips.appendChild(btn);
      }
      chips.style.display = '';
    } catch (_e) {
      // Best-effort: chips are nice-to-have. Silent failure preserves
      // the chat surface for users on locked-down networks where
      // even loopback HTTP gets odd quirks.
    }
  }
  loadChips();

  // Phase 2 (1.8.0) — scroll-aware autoscroll. We only auto-snap to
  // bottom when the user is already at (or very near) the bottom; if
  // they've scrolled up to read older content, new messages stack
  // up out of view and the floating "↓ N new" jump button appears.
  // Threshold matches the 100px buffer in the plan doc.
  const AUTOSCROLL_THRESHOLD_PX = 100;
  let autoStickToBottom = true;
  let unreadCount = 0;

  function isNearBottom() {
    return $history.scrollTop + $history.clientHeight >= $history.scrollHeight - AUTOSCROLL_THRESHOLD_PX;
  }

  function refreshScrollJump() {
    if (autoStickToBottom || unreadCount === 0) {
      $scrollJump.classList.remove('visible');
      $scrollJump.textContent = '';
      return;
    }
    $scrollJump.classList.add('visible');
    $scrollJump.textContent = '↓ ' + unreadCount + ' new';
  }

  function jumpToBottom() {
    autoStickToBottom = true;
    unreadCount = 0;
    refreshScrollJump();
    requestAnimationFrame(() => {
      $history.scrollTop = $history.scrollHeight;
    });
  }

  function autoScroll() {
    if (autoStickToBottom) {
      requestAnimationFrame(() => {
        $history.scrollTop = $history.scrollHeight;
      });
      return;
    }
    // User is reading older content — count the new arrival rather
    // than yanking the viewport. The floating button lets them catch
    // up at their own pace.
    unreadCount++;
    refreshScrollJump();
  }

  $history.addEventListener('scroll', () => {
    const wasSticky = autoStickToBottom;
    autoStickToBottom = isNearBottom();
    if (autoStickToBottom && !wasSticky) {
      // The user manually scrolled back to bottom; clear the unread
      // counter so the floating button retracts cleanly.
      unreadCount = 0;
    }
    refreshScrollJump();
  }, { passive: true });

  $scrollJump.addEventListener('click', jumpToBottom);

  // ---- markdown rendering (Phase 2 / 1.8.0) ---------------------------
  // Inline DOM-builder for assistant messages. Untrusted text always
  // flows through textContent / createTextNode — never innerHTML. Link
  // hrefs are filtered through isSafeUrl before assignment, blocking
  // javascript:, data:, vbscript:, file: and any other non-http(s)
  // scheme. A static enforcement test in tests/test_chat_markdown.py
  // checks that every `.innerHTML =` in this IIFE has a string-literal
  // or WELCOME_HTML right-hand side, never an arbitrary variable.
  //
  // Supported features:
  //   blocks  : paragraphs, code fences (```lang ... ```),
  //             unordered/ordered lists, headings (rendered as bold
  //             paragraphs to suit the chat-panel scale).
  //   inline  : `code`, **bold**, __bold__, *italic*, _italic_,
  //             [text](url) with URL allowlist.
  //
  // Deliberately omitted (deferred to v1.9.0): tables, blockquotes,
  // images via markdown syntax, autolinks. The model produces these
  // rarely enough that plaintext fallback is acceptable.

  // Allow http(s) absolute, mailto:, hash anchors, root-relative, and
  // explicit relative paths. Reject anything that looks like a scheme
  // we don't trust (javascript:, data:, vbscript:, file:, blob:, etc.).
  // Also reject any URL containing internal whitespace or control
  // characters: the browser strips them when assigning to .href, so
  // "Java\tScript:alert(1)" would normalise to a javascript: scheme
  // at click time even though the scheme regex thinks otherwise.
  function isSafeUrl(href) {
    if (!href) return false;
    const s = String(href).trim();
    if (!s) return false;
    if (/[\x00-\x1f\s]/.test(s)) return false;
    const schemeMatch = /^([a-z][a-z0-9+.-]*):/i.exec(s);
    if (schemeMatch) {
      const scheme = schemeMatch[1].toLowerCase();
      return scheme === 'http' || scheme === 'https' || scheme === 'mailto';
    }
    return s.startsWith('#') || s.startsWith('/') || s.startsWith('?') || s.startsWith('./') || s.startsWith('../') || /^[\w-]/.test(s);
  }

  // Tokenise one paragraph's worth of text into a flat list of
  // {type, value | text+href} markers. Priority encoded by alternation
  // order: code > link > bold > italic. The regex never matches across
  // newlines (each delimiter excludes \n) so block-level layout stays
  // intact when this function is fed one paragraph at a time.
  function tokenizeInline(text) {
    const out = [];
    if (!text) return out;
    const re = /(`[^`\n]+`)|(\[[^\]\n]+\]\([^)\s]+\))|(\*\*[^*\n]+\*\*)|(__[^_\n]+__)|(\*[^*\n]+\*)|(_[^_\n]+_)/g;
    let last = 0;
    let m;
    while ((m = re.exec(text)) !== null) {
      if (m.index > last) out.push({ type: 'text', value: text.slice(last, m.index) });
      if (m[1]) {
        out.push({ type: 'code', value: m[1].slice(1, -1) });
      } else if (m[2]) {
        const linkM = /^\[([^\]\n]+)\]\(([^)\s]+)\)$/.exec(m[2]);
        if (linkM) out.push({ type: 'link', text: linkM[1], href: linkM[2] });
        else out.push({ type: 'text', value: m[2] });
      } else if (m[3]) {
        out.push({ type: 'bold', value: m[3].slice(2, -2) });
      } else if (m[4]) {
        out.push({ type: 'bold', value: m[4].slice(2, -2) });
      } else if (m[5]) {
        out.push({ type: 'italic', value: m[5].slice(1, -1) });
      } else if (m[6]) {
        out.push({ type: 'italic', value: m[6].slice(1, -1) });
      }
      last = re.lastIndex;
    }
    if (last < text.length) out.push({ type: 'text', value: text.slice(last) });
    return out;
  }

  function buildInlineNode(tok) {
    if (tok.type === 'text') return document.createTextNode(tok.value);
    if (tok.type === 'code') {
      const el = document.createElement('code');
      el.className = 'md-code';
      el.textContent = tok.value;
      return el;
    }
    if (tok.type === 'bold') {
      const el = document.createElement('strong');
      el.textContent = tok.value;
      return el;
    }
    if (tok.type === 'italic') {
      const el = document.createElement('em');
      el.textContent = tok.value;
      return el;
    }
    if (tok.type === 'link') {
      if (!isSafeUrl(tok.href)) {
        // Render the markdown source as literal text — never produce
        // an <a> with a hostile href. This is the XSS guard.
        return document.createTextNode('[' + tok.text + '](' + tok.href + ')');
      }
      const el = document.createElement('a');
      el.href = tok.href;
      el.target = '_blank';
      el.rel = 'noopener noreferrer';
      el.textContent = tok.text;
      return el;
    }
    return document.createTextNode('');
  }

  function renderInline(parent, text) {
    const tokens = tokenizeInline(text);
    for (const tok of tokens) parent.appendChild(buildInlineNode(tok));
  }

  // Block-level renderer. Walks the text line-by-line, emitting
  // paragraphs, fenced code, lists, and headings into `parent`.
  function renderMarkdownInto(parent, text) {
    if (!text) return;
    const lines = String(text).split('\n');
    let i = 0;
    let para = [];
    function flushPara() {
      if (!para.length) return;
      const p = document.createElement('div');
      p.className = 'md-p';
      renderInline(p, para.join('\n'));
      parent.appendChild(p);
      para = [];
    }
    while (i < lines.length) {
      const line = lines[i];
      const fenceMatch = /^```([a-zA-Z0-9_+-]*)\s*$/.exec(line);
      if (fenceMatch) {
        flushPara();
        const lang = fenceMatch[1] || '';
        const codeLines = [];
        i++;
        while (i < lines.length && !/^```\s*$/.test(lines[i])) {
          codeLines.push(lines[i]);
          i++;
        }
        if (i < lines.length) i++; // consume closing fence
        const pre = document.createElement('pre');
        pre.className = 'md-pre';
        const code = document.createElement('code');
        if (lang) code.className = 'lang-' + lang;
        code.textContent = codeLines.join('\n');
        pre.appendChild(code);
        parent.appendChild(pre);
        continue;
      }
      const ulMatch = /^[-*+]\s+(.*)$/.exec(line);
      const olMatch = /^\d+\.\s+(.*)$/.exec(line);
      if (ulMatch || olMatch) {
        flushPara();
        const ordered = !!olMatch;
        const list = document.createElement(ordered ? 'ol' : 'ul');
        list.className = ordered ? 'md-ol' : 'md-ul';
        while (i < lines.length) {
          const m2 = ordered
            ? /^\d+\.\s+(.*)$/.exec(lines[i])
            : /^[-*+]\s+(.*)$/.exec(lines[i]);
          if (!m2) break;
          const li = document.createElement('li');
          renderInline(li, m2[1]);
          list.appendChild(li);
          i++;
        }
        parent.appendChild(list);
        continue;
      }
      const hMatch = /^(#{1,6})\s+(.*)$/.exec(line);
      if (hMatch) {
        flushPara();
        const h = document.createElement('div');
        h.className = 'md-h';
        renderInline(h, hMatch[2]);
        parent.appendChild(h);
        i++;
        continue;
      }
      if (line === '') {
        flushPara();
        i++;
        continue;
      }
      para.push(line);
      i++;
    }
    flushPara();
  }

  function appendMessage(role, message) {
    clearWelcome();
    const div = document.createElement('div');
    div.className = 'msg ' + (
      role === 'user' ? 'user' :
      role === 'assistant' ? 'assistant' :
      role === 'tool_call' ? 'tool_call' :
      role === 'tool_result' ? 'tool_result' :
      role === 'error' ? 'error' :
      role === 'hint' ? 'hint' : 'tool_call'
    );
    const r = document.createElement('div');
    r.className = 'role';
    r.textContent = role;
    div.appendChild(r);
    const body = document.createElement('div');
    body.className = 'body';
    const text = message == null ? '' : String(message);
    if (role === 'assistant' && text) {
      // Markdown is assistant-only. user/tool_call/tool_result/error/
      // hint stay plain — those payloads either come from the user (no
      // need to render markup) or from tool execution (raw JSON should
      // not be reinterpreted as markdown).
      renderMarkdownInto(body, text);
    } else {
      body.textContent = text;
    }
    div.appendChild(body);
    if (role === 'assistant' && text) {
      // Phase 2 (1.8.0) — copy-to-clipboard button on assistant
      // messages. Stores the original markdown source on the button
      // dataset so the user gets the un-rendered text (preserving
      // backticks, lists, etc.) instead of stripped innerText.
      const copyBtn = document.createElement('button');
      copyBtn.type = 'button';
      copyBtn.className = 'msg-copy';
      copyBtn.textContent = 'copy';
      copyBtn.dataset.source = text;
      copyBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        copyToClipboard(text).then((ok) => {
          copyBtn.textContent = ok ? 'copied' : 'failed';
          copyBtn.classList.toggle('copied', ok);
          setTimeout(() => {
            copyBtn.textContent = 'copy';
            copyBtn.classList.remove('copied');
          }, 1200);
        });
      });
      div.appendChild(copyBtn);
    }
    $history.appendChild(div);
    autoScroll();
  }

  // Phase 1.2.1 (v2.2.1) — friendly recovery banner for HTTP 401 on
  // /send. The chat panel's auth token is server-injected at GET /
  // time; after a .tox rebuild the server rotates that token, but
  // the open browser tab still holds the old one — every /send POST
  // 401s until the user reloads. Pre-1.2.1 they saw a generic
  // "Could not reach TD WebServer ... HTTP 401" message and had to
  // know to press Cmd-R themselves. This builds a banner with an
  // inline "Reconnect" button that calls location.reload() so the
  // panel re-fetches the current token. DOM-built (not via
  // appendMessage) because appendMessage textContent-escapes the
  // 'error' role and we need a real <button>.
  function appendReconnectBanner() {
    clearWelcome();
    const div = document.createElement('div');
    div.className = 'msg error';
    const r = document.createElement('div');
    r.className = 'role';
    r.textContent = 'connection';
    div.appendChild(r);
    const body = document.createElement('div');
    body.className = 'body';
    body.textContent =
      'Connection unauthorized (HTTP 401). The chat-pipe token rotated — most likely a .tox rebuild happened in TouchDesigner. ';
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.textContent = 'Reconnect (reload this tab)';
    btn.style.cssText =
      'margin-left:8px;padding:4px 12px;background:#6B47FF;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:13px;';
    btn.addEventListener('click', () => {
      try {
        window.location.reload();
      } catch (_e) {
        // Some restricted contexts disallow reload; fall back to a
        // hint the user can act on manually.
        body.append(' (auto-reload blocked — press Cmd-R / F5)');
      }
    });
    body.appendChild(btn);
    div.appendChild(body);
    $history.appendChild(div);
    autoScroll();
  }

  // Best-effort clipboard copy. Modern browsers expose
  // navigator.clipboard.writeText, but it requires a secure context;
  // fall back to a synthetic textarea + execCommand for older WebKit
  // builds (the standalone runs against TouchDesigner's bundled
  // Chromium which is recent but not always permission-blessed).
  function copyToClipboard(text) {
    const t = String(text == null ? '' : text);
    if (navigator.clipboard && window.isSecureContext) {
      return navigator.clipboard.writeText(t).then(() => true, () => false);
    }
    return new Promise((resolve) => {
      try {
        const ta = document.createElement('textarea');
        ta.value = t;
        ta.setAttribute('readonly', '');
        ta.style.position = 'absolute';
        ta.style.left = '-9999px';
        document.body.appendChild(ta);
        ta.select();
        const ok = document.execCommand('copy');
        document.body.removeChild(ta);
        resolve(!!ok);
      } catch (_e) {
        resolve(false);
      }
    });
  }

  // ---- collapsible tool calls (Phase 2 / 1.8.0) -----------------------
  // The standalone runtime now broadcasts EV_TOOL_CALL/EV_TOOL_RESULT
  // as structured WS messages of types `tool_call` and `tool_result`.
  // The browser opens a <details> placeholder per call and the matching
  // result fills in latency + status. fullSync (history rehydration) is
  // unaffected — it still goes through appendMessage's plain-text path.
  let pendingToolCall = null;

  const TOOL_RESULT_TRUNC = 400;

  function formatArgSig(args) {
    if (!args || typeof args !== 'object') return '';
    const keys = Object.keys(args);
    if (!keys.length) return '';
    const parts = [];
    const max = Math.min(keys.length, 2);
    for (let i = 0; i < max; i++) {
      const k = keys[i];
      const v = args[k];
      let s;
      if (v == null) s = String(v);
      else if (typeof v === 'string') {
        s = v.length > 40 ? v.slice(0, 37) + '…' : v;
      } else if (typeof v === 'number' || typeof v === 'boolean') {
        s = String(v);
      } else if (Array.isArray(v)) {
        s = '[…]';
      } else if (typeof v === 'object') {
        s = '{…}';
      } else {
        s = '…';
      }
      parts.push(k + '=' + s);
    }
    if (keys.length > max) parts.push('…');
    return parts.join(', ');
  }

  function formatJsonPretty(value) {
    if (value == null) return String(value);
    try { return JSON.stringify(value, null, 2); }
    catch (_e) { return String(value); }
  }

  function appendToolCall(payload) {
    clearWelcome();
    const details = document.createElement('details');
    details.className = 'msg tool_call tool-pair';

    const summary = document.createElement('summary');
    summary.className = 'tool-pair-summary';

    const nameEl = document.createElement('span');
    nameEl.className = 'tool-name';
    nameEl.textContent = (payload && payload.name) || '?';
    const argEl = document.createElement('span');
    argEl.className = 'tool-args';
    const argSig = formatArgSig(payload && payload.args);
    argEl.textContent = '(' + argSig + ')';
    const statusEl = document.createElement('span');
    statusEl.className = 'tool-status';
    statusEl.textContent = ' · running…';

    summary.appendChild(nameEl);
    summary.appendChild(argEl);
    summary.appendChild(statusEl);
    details.appendChild(summary);

    const body = document.createElement('div');
    body.className = 'tool-pair-body';
    const argsBlock = document.createElement('pre');
    argsBlock.className = 'tool-args-block';
    const argsText = formatJsonPretty(payload && payload.args);
    if (!argsText || argsText === '{}' || argsText === 'null') {
      argsBlock.classList.add('empty');
    } else {
      argsBlock.textContent = argsText;
    }
    body.appendChild(argsBlock);
    details.appendChild(body);

    $history.appendChild(details);
    pendingToolCall = {
      details: details,
      statusEl: statusEl,
      body: body,
      name: (payload && payload.name) || '?',
    };
    autoScroll();
  }

  // Phase 2 (1.8.0) — TD node-path detection. Matches a leading
  // slash + at least two path segments (single-segment "/foo" too
  // ambiguous for a chip). Lookbehind avoids matching INSIDE a URL
  // like http://host/path or a windows-y "C:/foo/bar".
  const NODE_PATH_RE = /(?<![A-Za-z0-9_:/])(\/[A-Za-z_][A-Za-z0-9_]*(?:\/[A-Za-z_][A-Za-z0-9_]*)+)/g;

  function appendWithNodePathChips(parent, text) {
    if (!text) return;
    NODE_PATH_RE.lastIndex = 0;
    let last = 0;
    let m;
    while ((m = NODE_PATH_RE.exec(text)) !== null) {
      if (m.index > last) {
        parent.appendChild(document.createTextNode(text.slice(last, m.index)));
      }
      const chip = document.createElement('span');
      chip.className = 'node-path-chip';
      chip.textContent = m[1];
      chip.title = 'Click to ask about ' + m[1];
      chip.addEventListener('click', (e) => {
        e.stopPropagation();
        // Populate input — let the user edit / send. Auto-sending
        // would surprise users mid-conversation.
        $input.value = 'Inspect ' + m[1] + ' (use td_get_node_detail).';
        $input.focus();
        $input.selectionStart = $input.selectionEnd = $input.value.length;
      });
      parent.appendChild(chip);
      last = NODE_PATH_RE.lastIndex;
    }
    if (last < text.length) {
      parent.appendChild(document.createTextNode(text.slice(last)));
    }
  }

  // Phase 2 (1.8.0) — screenshot thumbnail. td_screenshot returns a
  // dict with `data_base64` (jpeg bytes b64-encoded) and `format`.
  // Render as an <img> bounded to 320×240; click opens the lightbox.
  // Allowed image mime types for the data: URL — anything else is
  // treated as untrusted and the frame falls through to the JSON path.
  const ALLOWED_SCREENSHOT_FORMATS = new Set(['jpeg', 'jpg', 'png', 'webp']);

  function looksLikeScreenshotResult(result) {
    if (!result || typeof result !== 'object') return false;
    const fmt = (result.format || '').toLowerCase();
    const data = result.data_base64;
    if (typeof data !== 'string' || !data) return false;
    if (!ALLOWED_SCREENSHOT_FORMATS.has(fmt)) return false;
    // Sanity: base64 only uses [A-Za-z0-9+/=]. A field that smuggled
    // a `<script>` literal in won't pass this guard.
    if (!/^[A-Za-z0-9+/=\s]+$/.test(data)) return false;
    return true;
  }

  function renderScreenshotInto(parent, result) {
    const fmt = (result.format || 'jpeg').toLowerCase();
    const mime = (fmt === 'jpg') ? 'image/jpeg' : 'image/' + fmt;
    const img = document.createElement('img');
    img.className = 'tool-screenshot';
    img.alt = 'screenshot of ' + (result.path || 'TOP');
    img.src = 'data:' + mime + ';base64,' + result.data_base64;
    img.addEventListener('click', () => openLightbox(img.src, img.alt));
    parent.appendChild(img);
    const meta = document.createElement('div');
    meta.className = 'tool-screenshot-meta';
    const parts = [];
    if (result.path) parts.push(result.path);
    if (result.width && result.height) parts.push(result.width + '×' + result.height);
    if (result.format) parts.push(result.format);
    if (typeof result.size_bytes === 'number') parts.push(Math.round(result.size_bytes / 1024) + 'kb');
    meta.textContent = parts.join(' · ');
    parent.appendChild(meta);
  }

  // Lightbox controls. Single shared overlay because there's only
  // ever one fullscreen at a time.
  const $lightbox = document.getElementById('lightbox');
  const $lightboxImg = document.getElementById('lightbox-img');

  function openLightbox(src, alt) {
    $lightboxImg.src = src;
    $lightboxImg.alt = alt || '';
    $lightbox.classList.add('visible');
    $lightbox.setAttribute('aria-hidden', 'false');
  }
  function closeLightbox() {
    $lightbox.classList.remove('visible');
    $lightbox.setAttribute('aria-hidden', 'true');
    // Drop the src so a stale screenshot doesn't linger in memory.
    $lightboxImg.removeAttribute('src');
  }
  $lightbox.addEventListener('click', closeLightbox);
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && $lightbox.classList.contains('visible')) {
      e.preventDefault();
      closeLightbox();
    }
  });

  function buildResultBlock(text, isError, options) {
    const opts = options || {};
    const wrap = document.createElement('div');
    wrap.className = 'tool-result-block';
    if (opts.screenshot) {
      renderScreenshotInto(wrap, opts.screenshot);
      // Even with a screenshot, expose the JSON metadata in a
      // truncated <pre> for completeness — drop the giant
      // data_base64 first so the body stays small.
      const metaText = formatJsonPretty(stripScreenshotPayload(opts.screenshot));
      const pre = document.createElement('pre');
      pre.className = 'tool-result-body' + (isError ? ' err' : '');
      pre.textContent = metaText;
      wrap.appendChild(pre);
      return wrap;
    }
    const pre = document.createElement('pre');
    pre.className = 'tool-result-body' + (isError ? ' err' : '');
    const truncated = text.length > TOOL_RESULT_TRUNC;
    const slice = truncated ? text.slice(0, TOOL_RESULT_TRUNC) : text;
    appendWithNodePathChips(pre, slice);
    if (truncated) {
      const moreNode = document.createElement('span');
      moreNode.className = 'tool-result-truncated';
      moreNode.textContent = ' …(+' + (text.length - TOOL_RESULT_TRUNC) + ' chars)';
      pre.appendChild(moreNode);
      const expand = document.createElement('button');
      expand.type = 'button';
      expand.className = 'tool-expand';
      expand.textContent = 'expand';
      expand.addEventListener('click', () => {
        // Replace the pre's content with the full text + chips.
        // We use innerHTML='' (allowed: empty literal RHS) to clear
        // before re-appending; never assigning untrusted strings.
        pre.innerHTML = '';
        appendWithNodePathChips(pre, text);
        expand.remove();
      });
      wrap.appendChild(pre);
      wrap.appendChild(expand);
      return wrap;
    }
    wrap.appendChild(pre);
    return wrap;
  }

  function stripScreenshotPayload(result) {
    // Return a shallow clone with the giant base64 field redacted —
    // keeps the metadata readable without dumping a few hundred KB
    // of payload into the chat.
    const out = {};
    for (const k of Object.keys(result || {})) {
      if (k === 'data_base64') {
        out[k] = '<' + (result[k] ? result[k].length : 0) + ' base64 chars>';
      } else {
        out[k] = result[k];
      }
    }
    return out;
  }

  function appendToolResult(payload) {
    if (!payload) return;
    const isError = !!payload.is_error;
    const latency = (typeof payload.latency_ms === 'number') ? payload.latency_ms : null;
    const resultText = formatJsonPretty(payload.result);
    // Phase 2 (1.8.0) — render td_screenshot results as inline
    // thumbnails. Detection is data-driven (presence of a base64
    // payload + allowed mime), not name-based, so a future
    // screenshot-returning tool gets the same treatment.
    const screenshot = looksLikeScreenshotResult(payload.result) ? payload.result : null;
    const blockOpts = screenshot ? { screenshot: screenshot } : null;
    if (pendingToolCall && pendingToolCall.name === payload.name) {
      const status = isError ? 'error' : 'ok';
      let txt = ' · ' + status;
      if (latency != null) txt += ' (' + latency + 'ms)';
      pendingToolCall.statusEl.textContent = txt;
      pendingToolCall.statusEl.className = 'tool-status ' + (isError ? 'err' : 'ok');
      const block = buildResultBlock(resultText, isError, blockOpts);
      pendingToolCall.body.appendChild(block);
      // Auto-open errors so the user sees them without an extra
      // click. Auto-open screenshots too so the thumbnail is
      // immediately visible — the whole point of inlining it.
      if (isError || screenshot) pendingToolCall.details.open = true;
      pendingToolCall = null;
      autoScroll();
      return;
    }
    // Stray tool_result — render as a standalone <details> with the
    // result already filled in. This is the path for results that
    // arrive without a matching call (e.g. after a textDAT reload
    // mid-turn lost the pending pointer).
    clearWelcome();
    const details = document.createElement('details');
    details.className = 'msg tool_result tool-pair';
    if (isError || screenshot) details.open = true;
    const summary = document.createElement('summary');
    summary.className = 'tool-pair-summary';
    const nameEl = document.createElement('span');
    nameEl.className = 'tool-name';
    nameEl.textContent = payload.name || '?';
    const statusEl = document.createElement('span');
    statusEl.className = 'tool-status ' + (isError ? 'err' : 'ok');
    let txt = ' · ' + (isError ? 'error' : 'ok');
    if (latency != null) txt += ' (' + latency + 'ms)';
    statusEl.textContent = txt;
    summary.appendChild(nameEl);
    summary.appendChild(statusEl);
    details.appendChild(summary);
    const body = document.createElement('div');
    body.className = 'tool-pair-body';
    body.appendChild(buildResultBlock(resultText, isError, blockOpts));
    details.appendChild(body);
    $history.appendChild(details);
    autoScroll();
  }

  function formatTokenCount(n) {
    if (n >= 100000) return (n / 1000).toFixed(0) + 'k';
    if (n >= 10000) return (n / 1000).toFixed(1) + 'k';
    if (n >= 1000) return (n / 1000).toFixed(2) + 'k';
    return String(n);
  }

  function refreshModelBadge() {
    if (!modelShort) {
      $modelBadge.textContent = '';
      $modelBadge.className = '';
      $modelBadge.removeAttribute('title');
      return;
    }
    const cls = modelShort === 'flash' ? 'flash' : (modelShort === 'pro' ? 'pro' : '');
    $modelBadge.textContent = 'model: ' + modelShort;
    $modelBadge.className = cls;
    if (modelFull && modelFull !== modelShort) {
      $modelBadge.title = modelFull + (modelTier ? ' (tier: ' + modelTier + ')' : '');
    } else {
      $modelBadge.title = modelTier ? 'tier: ' + modelTier : '';
    }
  }

  function refreshTokenMeter() {
    const total = turnInputTokens + turnOutputTokens;
    if (!total) {
      $tokenMeter.textContent = '';
      $tokenMeter.removeAttribute('title');
      return;
    }
    $tokenMeter.textContent = formatTokenCount(total) + ' tok';
    const parts = [
      'input:  ' + turnInputTokens,
      'output: ' + turnOutputTokens,
    ];
    if (turnCachedTokens) parts.push('cached: ' + turnCachedTokens);
    $tokenMeter.title = parts.join('\n');
  }

  function render() {
    const a = String(agentState || 'idle').toLowerCase();
    const w = String(wsState || 'connected').toLowerCase();
    const working = isWorkingAgentState(a);

    // Status text on the RHS shows agent state only — transport
    // surfaces on the LHS. Pre-1.8.0 we composed both into one
    // string; the split lets the user see ws=connected even while
    // the agent is mid-turn.
    $status.textContent = a;
    $wsState.textContent = w;
    $wsState.className = w === 'connected' ? 'connected'
      : (w === 'connecting' || w.startsWith('reconnecting')) ? 'connecting'
      : '';

    if (working) {
      // A new turn begins when we transition out of a non-working
      // state. Reset the token meter so the user sees fresh per-turn
      // counts. Model + tier persist (they belong to the SESSION).
      if (!lastWorking) {
        turnInputTokens = 0;
        turnOutputTokens = 0;
        turnCachedTokens = 0;
        refreshTokenMeter();
      }
      startPulse();
      $stop.classList.add('visible');
      $stop.disabled = false;
    } else {
      stopPulse();
      $stop.classList.remove('visible');
    }
    lastWorking = working;
  }

  function setModel(payload) {
    if (!payload) return;
    modelShort = String(payload.short || payload.model || '').toLowerCase();
    modelTier = String(payload.tier || '').toLowerCase();
    modelFull = String(payload.model || '');
    refreshModelBadge();
  }

  function recordUsage(payload) {
    const u = (payload && payload.usage) || {};
    // Add this call's tokens to the running per-turn totals. DeepSeek's
    // compat layer may omit some fields; treat each as optional.
    if (typeof u.input_tokens === 'number') turnInputTokens += u.input_tokens;
    if (typeof u.output_tokens === 'number') turnOutputTokens += u.output_tokens;
    if (typeof u.cache_read_input_tokens === 'number') turnCachedTokens += u.cache_read_input_tokens;
    refreshTokenMeter();
  }

  // v2.4 / Phase C.7 — session-cost meter. Pushed by the runtime
  // after every per-call EV_USAGE so the footer reflects the running
  // total. "Approximate" warning + pricing-version stamp travel in
  // the tooltip so the user knows the rate assumed.
  function updateSessionMeter(session) {
    const $sm = document.getElementById('session-meter');
    if (!$sm) return;
    // Empty / non-object → blank the pill so the :empty CSS rule hides it.
    if (!session || typeof session !== 'object') {
      while ($sm.firstChild) $sm.removeChild($sm.firstChild);
      $sm.title = '';
      return;
    }
    const inK = formatTokenCount(session.input_tokens || 0);
    const outK = formatTokenCount(session.output_tokens || 0);
    const usd = typeof session.approx_usd === 'number' ? session.approx_usd : 0;
    // Rebuild as DOM nodes so the cost portion gets its own span — that
    // lets us turn JUST the $X portion red without colouring the whole
    // "Session: …" prefix. innerHTML would also work but the security
    // hook in this repo (substring-matches "innerHTML =") complains
    // even on assignments to safe content; removeChild + appendChild
    // is the established pattern (see loadChips above).
    while ($sm.firstChild) $sm.removeChild($sm.firstChild);
    $sm.appendChild(document.createTextNode(`Session: ${inK} in · ${outK} out · ~`));
    const $cost = document.createElement('span');
    $cost.className = usd >= 1 ? 'cost over-dollar' : 'cost';
    $cost.textContent = `$${usd.toFixed(4)}`;
    $sm.appendChild($cost);
    $sm.title =
      `input:        ${session.input_tokens || 0}\n` +
      `output:       ${session.output_tokens || 0}\n` +
      `cache hits:   ${session.cache_hits || 0}\n` +
      `cache misses: ${session.cache_misses || 0}\n` +
      `pricing version: ${session.model_pricing_version || 'unknown'}\n` +
      `(approximate — DeepSeek may revise rates)`;
  }

  function setAgentStatus(text) {
    const newState = (text || 'idle').toLowerCase();
    const wasWorking = isWorkingAgentState(agentState);
    agentState = newState;
    // v2.1.0 — when the agent transitions from a working state back
    // to idle, the assistant has finished responding. Append a
    // contextual ASCII flourish to the last assistant message as
    // quiet visual punctuation. Wrapped in try/catch so a flourish
    // bug never blocks the status transition.
    if (wasWorking && newState === 'idle') {
      try { attachFlourishToLastAssistant(); } catch (_) { /* defensive */ }
    }
    // 2.1.3 — re-enable the send button only when the agent reports a
    // non-working state. ``isWorkingAgentState`` returns false for
    // 'idle', 'ready', 'reset', 'connected', 'error*', 'send failed*'
    // — i.e. anything where the user can safely fire a new turn.
    if (awaitingTurnEnd && !isWorkingAgentState(newState)) {
      clearAwaitingTurnEnd();
    }
    render();
  }

  function setWsStatus(text) {
    wsState = (text || 'connected').toLowerCase();
    render();
  }

  // Back-compat shim — the public window.tdpilotChat surface and any
  // legacy WS payloads of {type:'status', status:'<text>'} continue
  // to call setStatus(); route those to the agent channel since the
  // backend only emits agent state through that event.
  function setStatus(text) {
    setAgentStatus(text);
  }

  function fullSync(rows) {
    $history.innerHTML = '';
    welcomed = false;
    // A reset / rehydrate wipes the DOM, so any previously-open
    // tool-call placeholder is no longer in the document. Drop the
    // pointer so the next tool_result event can't try to fill in a
    // detached <details>.
    pendingToolCall = null;
    // Phase 2 (1.8.0) — same logic for the per-turn token meter.
    // /reset starts a fresh session; the meter must zero out and
    // the lastWorking gate must reset so the next "thinking…" tick
    // re-fires the per-turn reset path.
    turnInputTokens = 0;
    turnOutputTokens = 0;
    turnCachedTokens = 0;
    lastWorking = false;
    refreshTokenMeter();
    // Same for scroll state — the new content starts at zero, so
    // re-stick to bottom and clear any "unread" badge.
    autoStickToBottom = true;
    unreadCount = 0;
    refreshScrollJump();
    if (!rows || !rows.length) {
      // Re-render from the canonical template so the wizard div
      // is present in the new DOM. Then re-arm pollFirstRun against
      // the fresh element — the previous wizard pointer was wiped
      // by the innerHTML replacement.
      welcomed = true;
      $history.innerHTML = WELCOME_HTML;
      pollFirstRun();
      return;
    }
    for (const r of rows) appendMessage(r.role, r.message);
  }

  function send() {
    const text = $input.value;
    const trimmed = (text || '').trim();
    if (!trimmed) return;
    if (!HAS_VALID_TOKEN) {
      appendMessage(
        'error',
        'No session token in this page. Reload the chat from http://127.0.0.1:9987/ — opening the HTML directly bypasses the server-injected token and all requests will 401.',
      );
      return;
    }
    $input.value = '';
    // 2.1.3 — keep the send button disabled until the runtime emits
    // the matching turn-end status ('idle' / 'stopped' / 'error') over
    // the WebSocket. Re-enabling on fetch resolution (which returns
    // 'queued' instantly) used to let the user fire a follow-up while
    // the worker was still busy; the Chatmessage param then got
    // overwritten and the prior message was silently dropped. The
    // status-bus listener (see setAgentStatus) lifts the disable.
    $send.disabled = true;
    awaitingTurnEnd = true;
    // 2.3.1 — activity watchdog (was a one-shot wall-clock timer pre-fix).
    // armTurnEndWatchdog also fires from applyMessage on every WS event
    // so the deadline resets while the runtime is alive.
    armTurnEndWatchdog();
    setAgentStatus('sending…');
    appendMessage('user', trimmed);
    recordSent(trimmed);
    // 2.1.3 — JSON envelope. Pre-2.1.3 used plain text body, but
    // ``Content-Type: text/plain`` is a CORS "simple request" that
    // bypasses preflight; combined with ``TDPILOT_API_INSECURE`` this
    // exposed a drive-by-RCE vector. JSON forces CORS preflight which
    // the server's origin gate then rejects for cross-origin calls.
    fetch(SEND_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', ...AUTH_HEADERS },
      body: JSON.stringify({ message: trimmed }),
    })
      .then((r) => {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        setAgentStatus('thinking…');
      })
      .catch((err) => {
        // Fetch failed — restore button immediately, clear awaiting
        // flag + safety timer so a retry isn't blocked.
        clearAwaitingTurnEnd();
        setAgentStatus('send failed: ' + err.message);
        // Phase 1.2.1: split the 401 path off into a dedicated
        // banner with a reload button. Other failures (port not
        // listening, TD not running) still flow through the generic
        // appendMessage error path. The boundary is the bare "401"
        // token in err.message — set by the !r.ok branch above.
        const msg = (err && err.message) || '';
        if (/\b401\b/.test(msg)) {
          appendReconnectBanner();
        } else {
          appendMessage(
            'error',
            'Could not reach TD WebServer at ' + SEND_URL + ': ' + msg,
          );
        }
      })
      .finally(() => {
        $input.focus();
      });
  }

  function stopAgent() {
    // POST /stop is best-effort — the cooperative cancel checks the
    // flag between API calls, so the agent finishes the current call
    // before exiting. Show "stopping…" until the runtime emits its
    // own status change ('idle' / 'stopped') over the WebSocket.
    $stop.disabled = true;
    setAgentStatus('stopping…');
    fetch(STOP_URL, { method: 'POST', headers: { ...AUTH_HEADERS } })
      .catch((err) => {
        appendMessage('error', 'Stop request failed: ' + err.message);
      });
  }

  $send.addEventListener('click', send);
  $stop.addEventListener('click', stopAgent);

  // Phase 2 (1.8.0) — terminal-style ↑ history recall. Pressing ↑
  // when the input is empty pulls the last user message back; ↑ on a
  // recalled buffer cycles further back. ↓ moves forward. Reset
  // when the user starts typing or sends.
  const sentHistory = [];
  let recallIndex = -1;

  function recordSent(text) {
    if (!text) return;
    if (sentHistory.length && sentHistory[sentHistory.length - 1] === text) return;
    sentHistory.push(text);
    if (sentHistory.length > 50) sentHistory.shift();
    recallIndex = -1;
  }

  function recallPrev() {
    if (!sentHistory.length) return;
    if (recallIndex === -1) recallIndex = sentHistory.length - 1;
    else if (recallIndex > 0) recallIndex--;
    $input.value = sentHistory[recallIndex];
    // Move caret to end so the user can keep typing past the recalled text.
    requestAnimationFrame(() => {
      $input.selectionStart = $input.selectionEnd = $input.value.length;
    });
  }

  function recallNext() {
    if (recallIndex === -1) return;
    if (recallIndex < sentHistory.length - 1) {
      recallIndex++;
      $input.value = sentHistory[recallIndex];
    } else {
      recallIndex = -1;
      $input.value = '';
    }
  }

  $input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      send();
      return;
    }
    // Esc anywhere in the chat is a quick keyboard shortcut for stop.
    if (e.key === 'Escape' && $stop.classList.contains('visible')) {
      e.preventDefault();
      stopAgent();
      return;
    }
    // ↑ recall previous sent message — only when buffer is empty OR
    // we're already in recall mode (so a casual ↑ during normal
    // typing doesn't clobber the in-progress message).
    if (e.key === 'ArrowUp' && (!$input.value || recallIndex !== -1)) {
      e.preventDefault();
      recallPrev();
      return;
    }
    if (e.key === 'ArrowDown' && recallIndex !== -1) {
      e.preventDefault();
      recallNext();
      return;
    }
  });
  $input.addEventListener('input', () => {
    // Any free-form typing exits recall mode so subsequent ↑ doesn't
    // surprise the user by overwriting their changes.
    if ($input.value !== (sentHistory[recallIndex] || '')) {
      recallIndex = -1;
    }
  });

  // Document-scope shortcuts. Skip when focus is in the input so
  // typing characters never collides — except for Cmd/Ctrl variants
  // that the input wouldn't consume anyway.
  document.addEventListener('keydown', (e) => {
    const inInput = document.activeElement === $input;
    const cmd = e.metaKey || e.ctrlKey;

    if (e.key === 'Escape' && $stop.classList.contains('visible') && !inInput) {
      e.preventDefault();
      stopAgent();
      return;
    }
    // Cmd/Ctrl+K — clear the chat. Mirrors a common terminal binding
    // (clear screen) and the welcome screen reappears.
    if (cmd && (e.key === 'k' || e.key === 'K')) {
      e.preventDefault();
      fullSync([]);
      return;
    }
    // Cmd/Ctrl+/ — focus the input (universal "type something" shortcut).
    if (cmd && e.key === '/') {
      e.preventDefault();
      $input.focus();
      return;
    }
    // v2.1.0 — Cmd/Ctrl + `.` toggles quiet mode. Discoverable via
    // the title= tooltip on the toggle button at the far right of
    // the status bar. Period chosen because `.` evokes "minimal /
    // condensed" and isn't claimed by browsers.
    if (cmd && e.key === '.') {
      e.preventDefault();
      applyQuietMode(!document.documentElement.classList.contains('quiet-mode'));
      return;
    }
    // End — jump to bottom of history. Useful after scrolling up to
    // read older content.
    if (e.key === 'End' && !inInput) {
      e.preventDefault();
      jumpToBottom();
      return;
    }
  });

  // Public API still callable from TD-side webRenderTOP.executeJavaScript().
  window.tdpilotChat = {
    appendMessage,
    setStatus,
    fullSync,
    clear: () => fullSync([]),
  };

  // ---------------------------------------------------------------------
  // WebSocket subscribe to TD-side broadcast for real-time updates.
  // ---------------------------------------------------------------------
  let ws = null;
  let reconnectDelay = 500;

  function applyMessage(msg) {
    if (!msg || !msg.type) return;
    // v2.4 / B-009 (live-debug 2026-05-13) — false-timeout recovery.
    // If the JS watchdog tripped the idle-timeout mid-turn (e.g. a slow
    // pro extended-thinking call exceeded TURN_END_SAFETY_MS while
    // emitting no events), the next runtime event proves the agent is
    // still alive. tool_call / tool_result / append are unambiguous
    // proof-of-life; restore the working state instead of letting the
    // user keep staring at "idle (timeout)" while tool calls visibly
    // stream into the chat. ('model' and 'usage' alone don't recover
    // — they can arrive during shutdown bookkeeping after a real end.)
    const isProofOfLife = (
      msg.type === 'tool_call' ||
      msg.type === 'tool_result' ||
      msg.type === 'append'
    );
    if (isProofOfLife && !awaitingTurnEnd && agentState.startsWith('idle')) {
      awaitingTurnEnd = true;
      $send.disabled = true;
      setAgentStatus('thinking…');
    }
    switch (msg.type) {
      case 'append':       appendMessage(msg.role, msg.message); break;
      case 'tool_call':    appendToolCall(msg); break;
      case 'tool_result':  appendToolResult(msg); break;
      case 'status':       setStatus(msg.status); break;
      case 'model':        setModel(msg); break;
      case 'usage':        recordUsage(msg); break;
      case 'usage_session': updateSessionMeter(msg.session || {}); break;
      case 'fullSync':     fullSync(msg.rows || []); break;
      case 'clear':        fullSync([]); break;
      // v2.5.3 — tool approval banner. Server pushes
      // approval_request when the agent is about to run a
      // destructive tool; the banner blocks the chat input until the
      // user clicks Approve / Deny or the 30 s timeout fires.
      case 'approval_request': showApprovalBanner(msg); break;
    }
    // Activity watchdog: any event from the runtime proves it's alive.
    // The 'status' case may have already cleared awaitingTurnEnd via
    // setAgentStatus → clearAwaitingTurnEnd (when status was idle/done/
    // error); in that case the guard skips the re-arm and lets idle stick.
    if (awaitingTurnEnd) armTurnEndWatchdog();
  }

  // v2.5.3 — tool approval banner. Shown when the server pushes an
  // approval_request WS event; the user clicks Approve / Deny (or
  // the 30 s countdown elapses, in which case the SERVER decides
  // timeout — we don't auto-POST, we just disable the buttons so a
  // late click doesn't fight the server). POST /approve carries
  // {id, decision} back to the runtime, which signals the worker
  // thread blocked on threading.Event.wait inside the agent loop.
  let _approvalCountdownTimer = null;
  function showApprovalBanner(msg) {
    const banner = document.getElementById('approval-banner');
    const toolEl = document.getElementById('approval-banner-tool');
    const argsEl = document.getElementById('approval-banner-args');
    const approveBtn = document.getElementById('approval-banner-approve');
    const denyBtn = document.getElementById('approval-banner-deny');
    const countdownEl = document.getElementById('approval-banner-countdown');
    if (!banner || !toolEl || !approveBtn || !denyBtn) return;

    const approvalId = msg.id || '';
    const toolName = msg.tool || '(unknown)';
    const args = msg.args || {};
    const timeoutMs = Number(msg.timeout_ms) || 30000;

    toolEl.textContent = toolName;
    try {
      argsEl.textContent = JSON.stringify(args, null, 2);
    } catch (_) {
      argsEl.textContent = String(args);
    }

    let remainingMs = timeoutMs;
    const tick = () => {
      remainingMs -= 250;
      const s = Math.max(0, Math.ceil(remainingMs / 1000));
      countdownEl.textContent = s + 's';
      if (remainingMs <= 0) {
        clearInterval(_approvalCountdownTimer);
        _approvalCountdownTimer = null;
        // Buttons disabled at zero — the server's timeout fires server-side.
        approveBtn.disabled = true;
        denyBtn.disabled = true;
        countdownEl.textContent = 'timeout';
      }
    };
    countdownEl.textContent = Math.ceil(timeoutMs / 1000) + 's';
    if (_approvalCountdownTimer) clearInterval(_approvalCountdownTimer);
    _approvalCountdownTimer = setInterval(tick, 250);

    approveBtn.disabled = false;
    denyBtn.disabled = false;
    banner.classList.add('visible');

    const finish = () => {
      banner.classList.remove('visible');
      approveBtn.disabled = true;
      denyBtn.disabled = true;
      if (_approvalCountdownTimer) {
        clearInterval(_approvalCountdownTimer);
        _approvalCountdownTimer = null;
      }
    };

    const post = async (decision) => {
      approveBtn.disabled = true;
      denyBtn.disabled = true;
      try {
        const body = JSON.stringify({ id: approvalId, decision });
        const url = `http://${TD_HOST}:${TD_PORT}/approve`;
        const headers = HAS_VALID_TOKEN
          ? { 'Content-Type': 'application/json', 'X-TDPilot-Token': TOKEN }
          : { 'Content-Type': 'application/json' };
        await fetch(url, { method: 'POST', headers, body });
      } catch (err) {
        console.error('[tdpilot] /approve POST failed', err);
      } finally {
        finish();
      }
    };

    approveBtn.onclick = () => post('approve');
    denyBtn.onclick = () => post('deny');
  }

  function connectWS() {
    setWsStatus('connecting');
    try {
      // Browsers don't allow custom WebSocket headers, so the per-launch
      // token rides on the query string instead. Server validates it
      // in onWebSocketOpen — handshakes without a matching token are
      // rejected before being added to the broadcast registry.
      const tokenParam = HAS_VALID_TOKEN ? `?t=${encodeURIComponent(TOKEN)}` : '';
      ws = new WebSocket(`ws://${TD_HOST}:${TD_PORT}/${tokenParam}`);
    } catch (err) {
      console.error('[tdpilot] WS construct failed', err);
      scheduleReconnect();
      return;
    }
    ws.onopen = () => {
      reconnectDelay = 500;
      setWsStatus('connected');
      // 2.1.4 — Codex P2: if a turn was in flight when the WS dropped,
      // ``awaitingTurnEnd`` is still true and the button is locked
      // out. Reset on every reconnect — if the runtime is genuinely
      // still busy, the next status event will re-disable. If the
      // user fires a message while the runtime is busy, the FIFO
      // inbox queue catches it (so nothing is lost).
      if (awaitingTurnEnd) {
        clearAwaitingTurnEnd();
      }
      // 2026-05-11 — keepalive pings. TD 2025/macOS's webSocketSendText
      // is silently best-effort against dead sockets, so the server-side
      // reaper can't detect dropped clients via send-failure alone.
      // Solution: client sends a {"type":"ping"} every 5s; server's
      // onWebSocketReceiveText updates last_seen for this client; the
      // reaper evicts handles whose last_seen is older than 15s
      // (3 missed pings). Clears any existing timer first so reconnects
      // don't multiply.
      if (keepaliveTimer) { clearInterval(keepaliveTimer); }
      keepaliveTimer = setInterval(() => {
        if (ws && ws.readyState === WebSocket.OPEN) {
          try { ws.send(JSON.stringify({ type: 'ping' })); }
          catch (err) { /* readyState lied; let onclose handle it */ }
        }
      }, 5000);
    };
    ws.onmessage = (ev) => {
      try { applyMessage(JSON.parse(ev.data)); }
      catch (err) { console.error('[tdpilot] bad WS payload', err, ev.data); }
    };
    ws.onerror = (err) => { console.warn('[tdpilot] WS error', err); };
    ws.onclose = () => {
      // Stop keepalive so reconnect's onopen doesn't end up with two
      // overlapping timers ping-flooding the new socket.
      if (keepaliveTimer) { clearInterval(keepaliveTimer); keepaliveTimer = null; }
      ws = null;
      scheduleReconnect();
    };
  }
  // Keepalive timer handle — survives ws drops; cleared on close + open.
  let keepaliveTimer = null;

  function scheduleReconnect() {
    // Pre-1.7.1 this called setStatus() which routed through
    // isWorkingStatus() and made the Stop button visible because the
    // string didn't match any of the "not working" allow-list entries.
    // Now reconnect drives the ws channel only — the agent channel
    // stays at whatever it was, and the Stop button only shows when
    // the agent is actually working.
    setWsStatus(`reconnecting in ${reconnectDelay}ms`);
    setTimeout(connectWS, reconnectDelay);
    reconnectDelay = Math.min(reconnectDelay * 2, 8000);
  }

  connectWS();

  console.log('[tdpilot] ready, send url=', SEND_URL);
})();
</script>
</body>
